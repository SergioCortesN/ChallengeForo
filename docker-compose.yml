services:
  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=forohub
      - MYSQL_ROOT_PASSWORD=changeme
      - MYSQL_USER=forohub
      - MYSQL_PASSWORD=forohub
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_URL=jdbc:mysql://db:3306/forohub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SB_USER=forohub
      - DB_PASSWORD=forohub
      - JWT_SECRET=changeme
    ports:
      - "8080:8080"
    command: ["sh", "-c", "sleep 15 && java -jar /app/app.jar"]

volumes:
  db_data:
